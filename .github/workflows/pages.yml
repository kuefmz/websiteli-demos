name: Build static demo site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Prepare public site
        run: |
          rm -rf public-site
          mkdir -p public-site
          cp -R index.html prospects prompts docs README.md public-site/ 2>/dev/null || true
          touch public-site/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-site
          publish_branch: gh-pages
          force_orphan: true
