name: Validate demo site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check demo files
        run: |
          test -f index.html
          test -d prospects
          echo "Demo files are present. GitHub Pages should serve the gh-pages branch directly."
